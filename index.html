<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4">
    <div id="chat-box" class="border p-2 mb-4 h-64 overflow-y-auto"></div>
    <input id="api-key" type="password" placeholder="API Key" class="border p-2 w-full mb-2">
    <input id="user-input" type="text" placeholder="Message..." class="border p-2 w-full mb-2">
    <button onclick="sendMessage()" class="bg-blue-600 text-white p-2 w-full">Send</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input').value;
            const key = document.getElementById('api-key').value;
            const chatBox = document.getElementById('chat-box');
            
            chatBox.innerHTML += `<div class="text-right">You: ${input}</div>`;
            
            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "deepseek/deepseek-r1:free",
                        messages: [{role: "user", content: input}]
                    })
                });

                const data = await res.json();
                
                // DEBUG: Agar error hai toh pura data screen par dikha do
                if (data.choices && data.choices[0]) {
                    chatBox.innerHTML += `<div>AI: ${data.choices[0].message.content}</div>`;
                } else {
                    // Yahan aapko asli error dikhega
                    chatBox.innerHTML += `<div class="text-red-500">Error Details: ${JSON.stringify(data)}</div>`;
                }
            } catch(e) {
                chatBox.innerHTML += `<div class="text-red-500">Fetch Error: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
