<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #loading { position: fixed; inset: 0; background: #ffffff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .dark #loading { background: #111827; }
        body { font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-white dark:bg-gray-900 transition-colors">

    <div id="loading">Loading App...</div>

    <div id="app" class="flex w-full min-h-screen opacity-0 transition-opacity duration-500">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-gray-50 dark:bg-gray-950 border-r border-gray-200 dark:border-gray-800 -translate-x-full md:translate-x-0 transition-transform">
            <div class="p-4"><button onclick="app.createNewChat()" class="w-full bg-blue-600 text-white py-2 rounded-xl">New Chat</button></div>
            <div id="chat-list" class="flex-1 overflow-y-auto px-3"></div>
        </aside>

        <main class="flex-1 flex flex-col min-h-screen">
            <header class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-4">
                <button onclick="app.toggleSidebar()" class="md:hidden"><i class="fa-solid fa-bars"></i></button>
                <h1 id="mobile-header-title" class="font-semibold">New Chat</h1>
            </header>

            <div id="chat-container" class="flex-1 p-4 space-y-4 overflow-y-auto pb-40"></div>

            <div class="fixed bottom-0 w-full md:w-[calc(100%-16rem)] p-4 bg-white/80 dark:bg-gray-900/80 backdrop-blur">
                <div class="max-w-3xl mx-auto flex gap-2">
                    <textarea id="chat-input" class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none" rows="1" placeholder="Type a message..."></textarea>
                    <button id="send-btn" onclick="app.sendMessage()" class="bg-blue-600 text-white px-5 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const app = {
            state: { chats: [{id: '1', title: 'New Chat', messages: []}], currentChatId: '1', settings: {apiKey: ''} },
            
            init() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.opacity = '1';
                console.log("App loaded!");
            },
            
            toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); },
            
            createNewChat() { alert("New Chat Created"); },
            
            sendMessage() { 
                const input = document.getElementById('chat-input');
                if(!input.value.trim()) return;
                alert("Message sent: " + input.value); 
                input.value = '';
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
