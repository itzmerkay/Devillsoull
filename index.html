<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen">
    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center p-6 text-center">
        <div id="status-icon" class="text-4xl mb-4 animate-spin">⏳</div>
        <h2 id="status-text" class="text-xl font-bold">Loading App...</h2>
        <pre id="error-log" class="mt-4 text-red-500 text-sm max-w-xs break-words"></pre>
    </div>

    <script>
        // Global Error Handler for Debugging
        window.onerror = function(message, source, lineno, colno, error) {
            const el = document.getElementById('error-log');
            const status = document.getElementById('status-text');
            const icon = document.getElementById('status-icon');
            if(el) {
                el.innerText = `ERROR: ${message} at line ${lineno}`;
                status.innerText = "System Error";
                icon.innerText = "❌";
            }
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <script>
        // Simple Init Test
        try {
            console.log("Checking dependencies...");
            if (typeof marked === 'undefined') throw new Error("Marked.js failed to load (CDN Blocked)");
            if (typeof DOMPurify === 'undefined') throw new Error("DOMPurify failed to load (CDN Blocked)");
            
            // If we reach here, the script works!
            document.getElementById('loading').style.display = 'none';
            document.body.innerHTML += '<div class="p-10 text-center">App Initialized Successfully!</div>';
        } catch(e) {
            window.onerror(e.message, null, 0, 0, e);
        }
    </script>
</body>
</html>
